name: Build LADB APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: gradle/wrapper/gradle-wrapper.jar
          key: gradle-wrapper-${{ runner.os }}

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          APK=$(find app/build/outputs -name "*.apk" | head -1)
          echo "Found APK: $APK"
          if [ -z "$APK" ]; then echo "ERROR: No APK found"; exit 1; fi

          keytool -genkeypair \
            -alias ladb_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore ladb.jks \
            -storepass ladb@12345 \
            -keypass ladb@12345 \
            -dname "CN=LADB, OU=App, O=Dev, L=US, S=CA, C=US" \
            -noprompt

          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -v 4 "$APK" ladb-aligned.apk
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks ladb.jks \
            --ks-key-alias ladb_key \
            --ks-pass pass:ladb@12345 \
            --key-pass pass:ladb@12345 \
            --out ladb-release.apk \
            ladb-aligned.apk
          echo "[OK] Signed: $(du -h ladb-release.apk | cut -f1)"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ladb-release
          path: ladb-release.apk
          retention-days: 7
          overwrite: true

      - name: Upload Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build.log
          retention-days: 7
          overwrite: true
